<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Mount Builder - Sermon Calendar</title>
    <link rel="stylesheet" href="css/style.css?v=2024080612" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#722f37" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Mount Builder" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <link rel="apple-touch-icon" href="assets/mount-builder.png" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/mount-builder.png"
    />
    <link rel="icon" type="image/png" href="assets/mount-builder.png" />
    <link rel="mask-icon" href="assets/mount-builder.png" color="#722f37" />
  </head>
  <body class="safe-padding-bottom">
    <!-- main header - calendar page -->
    <header class="main-header">
      <img src="./assets/mount-builder.png" alt="mount builder" class="logo" />
    </header>

    <div class="calendar-section">
      <div class="calendar-header">
        <h2>Sermon Calendar</h2>
      </div>

      <!-- month navigation and title -->
      <div class="calendar-controls">
        <div class="nav-buttons">
          <button type="button" id="prev-month">←</button>
          <button type="button" id="next-month">→</button>
        </div>
        <h3 id="current-month">January 2024</h3>
      </div>

      <div id="calendar-grid" class="calendar-grid"></div>

      <!-- planning tools - future features -->
      <div class="planning-tools">
        <button type="button" class="input-btn">Add Series</button>
        <button type="button" class="input-btn">Schedule Sermon</button>
        <button type="button" class="input-btn">View Timeline</button>
      </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
      <a href="index.html" class="bottom-nav-item">
        <div class="bottom-nav-icon">✍️</div>
        <div class="bottom-nav-label">Sermon</div>
      </a>
      <a href="library.html" class="bottom-nav-item">
        <div class="bottom-nav-icon">📚</div>
        <div class="bottom-nav-label">Library</div>
      </a>
      <a href="bible.html" class="bottom-nav-item">
        <div class="bottom-nav-icon">📖</div>
        <div class="bottom-nav-label">Bible</div>
      </a>
      <a href="calendar.html" class="bottom-nav-item active">
        <div class="bottom-nav-icon">📅</div>
        <div class="bottom-nav-label">Calendar</div>
      </a>
    </nav>

    <script src="js/validation.js"></script>
    <script src="js/api.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/app.js"></script>
    <script src="js/touch-interactions.js"></script>
    <script src="js/theme-manager.js"></script>
    <script>
      // Initialize calendar page
      document.addEventListener("DOMContentLoaded", function () {
        loadSermons();
        renderCalendar();
      });

      // Service Worker Registration
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((registration) => {
              console.log("SW registered: ", registration);
            })
            .catch((registrationError) => {
              console.log("SW registration failed: ", registrationError);
            });
        });
      }
    </script>
  </body>
</html>
